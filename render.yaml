services:
  - type: web
    name: habitflowai-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: habitflowai
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BOOTSTRAP_ADMIN_KEY
        sync: false
